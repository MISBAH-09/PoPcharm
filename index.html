<!DOCTYPE html>
<html lang="en">
<head>

  <title>Pop Charm • Handmade Accessories & Paints</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Discover Pop Charm's beautiful handcrafted accessories, customized nail paints, pearl bracelets, and keychains. High quality and customization available with shipping across Pakistan.">
  <meta name="keywords" content="Pop Charm, nail paints, handmade accessories, pearl bracelets, keychains, custom gifts, Pakistan shopping">

  <!-- Tailwind CSS & FontAwesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts: Outfit (modern sans-serif) & Comic Neue (playful headings) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Comic+Neue:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  
  <!-- React 18 & Babel CDN (Allows JSX compiler inside the browser directly) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>

  <!-- Tailwind Configuration for Pop Charm Branding -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              pink: '#ff4d94',
              pinkLight: '#ff80b3',
              pinkDark: '#d62d73',
              purple: '#8b5cf6',
              purpleLight: '#a78bfa',
              purpleDark: '#6d28d9',
              gold: '#eab308',
              goldLight: '#fef08a',
              cream: '#fff5f7',
              dark: '#1e1b4b',
            }
          },
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            hand: ['Comic Neue', 'cursive'],
          },
          animation: {
            'float-slow': 'float 8s ease-in-out infinite',
            'float-mid': 'float 6s ease-in-out infinite 2s',
            'pulse-subtle': 'pulseSubtle 4s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          }
        }
      }
    }
  </script>

  <!-- Custom CSS for gradients, scrolls, and animation keyframes -->
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1.5deg); }
    }
    @keyframes pulseSubtle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    body {
      background: radial-gradient(circle at 10% 20%, #fff0f3 0%, #f5ebff 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Glassmorphism Styles */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 77, 148, 0.1);
    }
    
    .glass-modal {
      background: rgba(15, 10, 25, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #fff5f7;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #ff80b3;
      border-radius: 99px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #ff4d94;
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
  
  <!-- Dynamic Catalog Script (writes to window.POP_CHARM_CATALOG) -->
  <script src="catalog_data.js"></script>
</head>
<body class="font-sans text-gray-800 antialiased selection:bg-brand-pinkLight selection:text-white custom-scrollbar">

  <!-- React Application Mount Point -->
  <div id="root"></div>

  <!-- React code utilizing CDN React/ReactDOM & Babel -->
  <script type="text/babel">

    const PAINTS_CATALOG = [
      {
        id: "paint-abc",

      const [customerName, setCustomerName] = useState("");

      const [scrolled, setScrolled] = useState(false);
      const [toast, setToast] = useState("");

      // Load dynamically scanned images from update_catalog.py
      useEffect(() => {
        if (window.POP_CHARM_CATALOG) {

        }
        
        // Scroll listener for header
        const handleScroll = () => {
          setScrolled(window.scrollY > 40);
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      const triggerToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(""), 3500);
      };

      // Form Order Submission logic
      const submitOrder = (e) => {
        e.preventDefault();
        if (!orderItem) return;

        const orderText = `*New Order Request from Pop Charm Website!* 💖
---------------------------------------------
🛍️ *Product:* ${orderItem.name}
💰 *Price:* Rs. ${orderItem.price}/-
📂 *Category:* ${orderItem.category}
👤 *Customer Name:* ${customerName || "Valued Customer"}
🎨 *Customization Notes:* ${customizationText || "Standard design (no custom changes)"}
---------------------------------------------
📱 _Prepared via Online Catalog Form._`;

        const encodedMsg = encodeURIComponent(orderText);
        const url = `https://wa.me/${whatsappNumber}?text=${encodedMsg}`;
        
        triggerToast("Preparing your order message! Redirecting to WhatsApp... 💬");
        setTimeout(() => {
          window.open(url, "_blank");
          setOrderItem(null);
          setCustomerName("");
          setCustomizationText("");
        }, 1000);
      };

      // Switch category tabs and scroll smoothly
      const handleTabChange = (tabId) => {
        setActiveTab(tabId);
        const element = document.getElementById("catalog-section");
        if (element) {
          element.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      };

        <div className="min-h-screen flex flex-col">
          
          {/* TOAST POPUP */}
          {toast && (
            <div className="fixed bottom-8 right-8 z-[200] bg-brand-dark text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-brand-pink/30 animate-slide-up">

                <span className="relative inline-flex rounded-full h-3 w-3 bg-brand-pink"></span>

                </button>
                <button 
                  onClick={() => handleTabChange("pearls")} 
                  className={`px-5 py-2.5 rounded-full text-xs font-bold transition-all duration-300 flex items-center gap-2 ${activeTab === "pearls" ? "bg-gradient-to-r from-brand-pink to-brand-purple text-white shadow-md scale-105" : "text-gray-600 hover:text-brand-pink hover:bg-white"}`}
                >
                  <i className="fas fa-gem"></i> Pearls & Bracelets
                </button>
                <button 
                  onClick={() => handleTabChange("keychains")} 
                  className={`px-5 py-2.5 rounded-full text-xs font-bold transition-all duration-300 flex items-center gap-2 ${activeTab === "keychains" ? "bg-gradient-to-r from-brand-pink to-brand-purple text-white shadow-md scale-105" : "text-gray-600 hover:text-brand-pink hover:bg-white"}`}

                  <i className="fas fa-key"></i> Keychains
                </button>
              </nav>

              {/* SOCIAL MEDIA / WHATSAPP ACTION BUTTON */}

                <a href="https://www.instagram.com/popcharm_paints/" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full flex items-center justify-center bg-white border border-pink-100 hover:bg-brand-pink hover:text-white transition-all text-brand-pink shadow-sm">
                  <i className="fab fa-instagram text-lg"></i>
                </a>
                <a href={`https://wa.me/${whatsappNumber}`} target="_blank" rel="noopener noreferrer" className="hidden sm:flex items-center gap-2 bg-gradient-to-r from-green-400 to-green-500 hover:from-green-500 hover:to-green-600 text-white font-bold text-xs px-5 py-3 rounded-full shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all">

              <button onClick={() => setActiveTab("pearls")} className={`px-4 py-2.5 rounded-full text-xs font-bold transition-all ${activeTab === "pearls" ? "bg-gradient-to-r from-brand-pink to-brand-purple text-white shadow-sm" : "text-gray-600"}`}>Pearls</button>

                      <span>Send Order on WhatsApp</span>
                    </button>
                    <p className="text-[10px] text-center text-gray-400">
                      Submitting prepares a pre-filled WhatsApp message. You can adjust details in the chat before sending.
                    </p>
                  </div>

                </form>

              </div>
            </div>
          )}

        </div>
      );
    }

    // Mount application
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
